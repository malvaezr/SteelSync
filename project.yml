name: SteelSync
options:
  bundleIdPrefix: com.jrfv
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

schemes:
  SteelSync:
    build:
      targets:
        SteelSync: all
  SteelSync-iPad:
    build:
      targets:
        SteelSync-iPad: all
  SteelSync-iPhone:
    build:
      targets:
        SteelSync-iPhone: all
  SteelSync-Phone:
    build:
      targets:
        SteelSync-Phone: all
  SteelSyncWidgets-iPad:
    build:
      targets:
        SteelSyncWidgets-iPad: all
  SteelSyncWidgets:
    build:
      targets:
        SteelSyncWidgets: all

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  SteelSync:
    type: application
    platform: macOS
    sources:
      - path: SteelSync
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jrfv.SteelSync
        PRODUCT_NAME: SteelSync
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        DEVELOPMENT_TEAM: "HN7D225STF"
        CODE_SIGN_ENTITLEMENTS: SteelSync/SteelSync.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  SteelSync-iPad:
    type: application
    platform: iOS
    sources:
      - path: SteelSync
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jrfv.SteelSync
        PRODUCT_NAME: SteelSync
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "2"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        DEVELOPMENT_TEAM: "HN7D225STF"
        CODE_SIGN_ENTITLEMENTS: SteelSync/SteelSync.entitlements
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: SteelSyncWidgets-iPad
        embed: true

  SteelSyncWidgets-iPad:
    type: app-extension
    platform: iOS
    sources:
      - path: SteelSyncWidgets
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jrfv.SteelSync.SteelSyncWidgets
        PRODUCT_NAME: SteelSyncWidgets
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        DEVELOPMENT_TEAM: "HN7D225STF"
        CODE_SIGN_ENTITLEMENTS: SteelSyncWidgets/SteelSyncWidgets.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies: []

  SteelSync-iPhone:
    type: application
    platform: iOS
    sources:
      - path: SteelSync
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jrfv.SteelSync.Go
        PRODUCT_NAME: "SteelSync Go"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        DEVELOPMENT_TEAM: "HN7D225STF"
        CODE_SIGN_ENTITLEMENTS: SteelSync/SteelSync.entitlements
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "STEELSYNC_IPHONE"

  SteelSync-Phone:
    type: application
    platform: iOS
    sources:
      - path: SteelSync
        type: group
      - path: SteelSyncPhone
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jrfv.SteelSync.Phone
        PRODUCT_NAME: "SteelSync Field"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_GENERATION_MODE: GeneratedFile
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        DEVELOPMENT_TEAM: "HN7D225STF"
        CODE_SIGN_ENTITLEMENTS: SteelSyncPhone/SteelSyncPhone.entitlements
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "STEELSYNC_PHONE"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - target: SteelSyncWidgets
        embed: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

  SteelSyncWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: SteelSyncWidgets
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jrfv.SteelSync.Phone.SteelSyncWidgets
        PRODUCT_NAME: SteelSyncWidgets
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        DEVELOPMENT_TEAM: "HN7D225STF"
        CODE_SIGN_ENTITLEMENTS: SteelSyncWidgets/SteelSyncWidgets.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies: []
